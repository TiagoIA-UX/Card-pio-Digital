name: CI

on:
  pull_request:
  push:
    branches: [ main, feature/import-chat-app ]

jobs:
  test-and-serve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm ci
      - run: npm start & sleep 2
      - run: curl -fS http://localhost:5173 || (echo 'site did not respond' && exit 1)
